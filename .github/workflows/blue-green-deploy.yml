name: Blue-Green Deployment

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Docker image tag to deploy'
        required: true
        default: 'latest'
      environment:
        description: 'Target environment'
        required: true
        type: choice
        options:
          - staging
          - production

jobs:
  deploy:
    name: Blue-Green Deployment
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig \
            --name scavenger-${{ github.event.inputs.environment }} \
            --region us-east-1

      - name: Deploy blue-green
        run: |
          chmod +x scripts/blue-green-deploy.sh
          ./scripts/blue-green-deploy.sh scavenger:${{ github.event.inputs.image_tag }}
        env:
          NAMESPACE: scavenger-${{ github.event.inputs.environment }}
          SMOKE_TEST_URL: https://api-${{ github.event.inputs.environment }}.scavenger.io/health

      - name: Verify deployment
        run: |
          kubectl get deployments -n scavenger-${{ github.event.inputs.environment }}
          kubectl get pods -n scavenger-${{ github.event.inputs.environment }}

      - name: Notify Slack
        if: always()
        uses: slackapi/slack-github-action@v1.24.0
        with:
          webhook-url: ${{ secrets.SLACK_WEBHOOK }}
          payload: |
            {
              "text": "Blue-Green Deployment ${{ job.status }}",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Blue-Green Deployment*\nEnvironment: ${{ github.event.inputs.environment }}\nImage: scavenger:${{ github.event.inputs.image_tag }}\nStatus: ${{ job.status }}"
                  }
                }
              ]
            }

  rollback:
    name: Rollback on Failure
    runs-on: ubuntu-latest
    needs: deploy
    if: failure()
    environment: ${{ github.event.inputs.environment }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig \
            --name scavenger-${{ github.event.inputs.environment }} \
            --region us-east-1

      - name: Rollback to blue
        run: |
          kubectl patch service scavenger \
            -n scavenger-${{ github.event.inputs.environment }} \
            -p '{"spec":{"selector":{"slot":"blue"}}}'
          echo "Rolled back to blue deployment"

      - name: Notify Slack
        uses: slackapi/slack-github-action@v1.24.0
        with:
          webhook-url: ${{ secrets.SLACK_WEBHOOK }}
          payload: |
            {
              "text": "⚠️ Deployment Rollback",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Deployment Rollback*\nEnvironment: ${{ github.event.inputs.environment }}\nImage: scavenger:${{ github.event.inputs.image_tag }}\nRolled back to blue deployment"
                  }
                }
              ]
            }
